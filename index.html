<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> Dating</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#050505;

background-image:
radial-gradient(circle at top,#5224ff33 0%,transparent 35%),
radial-gradient(circle at bottom,#7d3cff22 0%,transparent 40%);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:white;

}

.card{

width:92%;

max-width:390px;

background:rgba(18,18,18,.88);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

border-radius:32px;

padding:35px 28px;

text-align:center;

box-shadow:

0 0 40px rgba(125,60,255,.25),

0 20px 60px rgba(0,0,0,.7);

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.logo{

width:120px;

height:120px;

margin:auto;

border-radius:50%;

background:linear-gradient(135deg,#6d3bff,#b85cff);

display:flex;

justify-content:center;

align-items:center;

font-size:58px;

box-shadow:

0 0 30px #8a4fff,

0 0 70px #5d2eff55;

margin-bottom:25px;

animation:pulse 2s infinite;

}

@keyframes pulse{

50%{

transform:scale(1.05);

box-shadow:

0 0 40px #9b65ff,

0 0 90px #7338ff;

}

}

h1{

font-size:33px;

font-weight:700;

margin-bottom:8px;

}

.tag{

font-size:15px;

color:#b8b8b8;

line-height:26px;

margin-bottom:35px;

}

#googleBtn{

width:100%;

height:58px;

border:none;

border-radius:18px;

background:linear-gradient(90deg,#7a3cff,#a950ff);

color:white;

font-size:17px;

font-weight:600;

display:flex;

align-items:center;

justify-content:center;

gap:14px;

cursor:pointer;

transition:.35s;

box-shadow:0 10px 30px rgba(122,60,255,.4);

}

#googleBtn:hover{

transform:translateY(-3px);

box-shadow:0 18px 40px rgba(122,60,255,.6);

}

#googleBtn img{

width:24px;

height:24px;

background:white;

border-radius:50%;

padding:2px;

}

small{

display:block;

margin-top:28px;

line-height:24px;

font-size:12px;

color:#8d8d8d;

}

.footer{

margin-top:30px;

font-size:13px;

color:#666;

}

.version{

margin-top:10px;

font-size:11px;

letter-spacing:3px;

color:#555;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
❤
</div>

<h1>Dating</h1>

<div class="tag">
Meet new people around you.<br>
Simple. Private. Beautiful.
</div>

<button id="googleBtn">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Continue with Google

</button>

<small>

By continuing you agree to our Terms of Service and Privacy Policy.

</small>

<div class="footer">

Made with ❤️

</div>

<div class="version">

ROYAL BLACK EDITION

</div>

</div>

<script type="module" src="index.js"></script>

</body>
</html>
