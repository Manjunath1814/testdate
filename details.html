<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile</title>

    <link rel="stylesheet" href="details.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Complete Profile</h1>
        <p>Let's set up your dating profile</p>
    </div>

    <form id="profileForm">

        <!-- Profile Picture -->
        <div class="profile-section">

            <label for="profileImage">

                <img id="previewImage"
                src="https://cdn-icons-png.flaticon.com/512/847/847969.png">

                <div class="camera">
                    📷
                </div>

            </label>

            <input
                type="file"
                id="profileImage"
                accept="image/*"
                hidden>

        </div>

        <!-- Name -->

        <div class="input-group">

            <label>Full Name</label>

            <input
                type="text"
                id="name"
                placeholder="Enter your full name"
                required>

        </div>

        <!-- Gender -->

        <div class="input-group">

            <label>Gender</label>

            <div class="gender-box">

                <label>
                    <input
                    type="radio"
                    name="gender"
                    value="Male">
                    Male
                </label>

                <label>
                    <input
                    type="radio"
                    name="gender"
                    value="Female">
                    Female
                </label>

                <label>
                    <input
                    type="radio"
                    name="gender"
                    value="Other">
                    Other
                </label>

            </div>

        </div>

        <!-- Date of Birth -->

        <div class="input-group">

            <label>Date of Birth</label>

            <input
                type="date"
                id="dob"
                required>

        </div>

        <!-- Looking For -->

        <div class="input-group">

            <label>Looking For</label>

            <select id="lookingFor">

                <option value="">Select</option>

                <option>Men</option>

                <option>Women</option>

                <option>Everyone</option>

            </select>

        </div>

        <!-- Location -->

        <div class="input-group">

            <label>Location</label>

            <button
                type="button"
                id="locationBtn">

                📍 Use Current Location

            </button>

            <p id="locationText">
                Location not selected
            </p>

        </div>

        <!-- Continue -->

        <button
            type="submit"
            id="continueBtn">

            Continue

        </button>

    </form>

</div>

<script type="module" src="details.js"></script>

</body>
</html>
