<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complete Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}

:root{

--bg:#050505;
--card:#121212;
--purple:#7A3CFF;
--purple2:#A779FF;
--text:#ffffff;
--grey:#A2A2A2;

}

body{

background:var(--bg);
color:var(--text);

overflow-x:hidden;

}

button,
input{

font-family:inherit;

outline:none;

}

button{

cursor:pointer;

border:none;

}

.material-symbols-rounded{

font-size:26px;

color:#fff;

}

main{

max-width:650px;

margin:auto;

padding:35px 22px 80px;

}

.logo{

width:90px;

height:90px;

margin:10px auto 20px;

display:flex;

align-items:center;

justify-content:center;

background:#121212;

border-radius:50%;

box-shadow:0 0 30px rgba(122,60,255,.35);

}

.logo img{

width:58px;

height:58px;

object-fit:contain;

}

h1{

text-align:center;

font-size:30px;

margin-bottom:8px;

}

.subtitle{

text-align:center;

color:#A0A0A0;

margin-bottom:35px;

line-height:1.6;

}

.card{

background:#121212;

border:1px solid rgba(255,255,255,.06);

border-radius:24px;

padding:22px;

margin-bottom:22px;

}

.label{

display:block;

margin-bottom:10px;

font-size:15px;

font-weight:600;

}

.input{

width:100%;

height:56px;

padding:0 18px;

border-radius:18px;

border:1px solid rgba(255,255,255,.06);

background:#1A1A1A;

color:white;

font-size:15px;

}

.gender-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:14px;

margin-top:15px;

}

.gender-card{

height:90px;

border-radius:20px;

background:#1A1A1A;

border:2px solid transparent;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:8px;

cursor:pointer;

transition:.3s;

}

.gender-card.active{

border-color:#7A3CFF;

background:rgba(122,60,255,.12);

box-shadow:0 0 20px rgba(122,60,255,.25);

}

.gender-card span{

font-size:34px;

}

.gender-card h3{

font-size:15px;

font-weight:600;

}

.continue-btn{

width:100%;

height:58px;

margin-top:24px;

border-radius:18px;

background:linear-gradient(135deg,#7A3CFF,#A779FF);

color:white;

font-size:17px;

font-weight:600;

box-shadow:0 0 22px rgba(122,60,255,.4);

transition:.3s;

}

.continue-btn:hover{

transform:translateY(-2px);

box-shadow:0 0 30px rgba(122,60,255,.6);

}

.loading{

display:none;

margin-top:20px;

text-align:center;

color:#A0A0A0;

font-size:14px;

}

@media(max-width:480px){

h1{

font-size:26px;

}

.gender-card{

height:82px;

}

}

</style>

</head>

<body>

<main>

<div class="logo">

<!-- Use the same heart logo as your login page -->

<img src="images/logo.png" alt="Logo">

</div>

<h1>

Complete Your Profile

</h1>

<p class="subtitle">

Tell us a few details to find people who match your preferences.

</p>

<div class="card">

<label class="label">

Username

</label>

<input
type="text"
id="username"
class="input"
placeholder="Enter your username">

</div>

<div class="card">

<label class="label">

Date of Birth

</label>

<input
type="date"
id="dob"
class="input">

</div>

<div class="card">

<label class="label">

Select Your Gender

</label>

<div class="gender-grid">

<div
class="gender-card"
id="maleCard">

<span>👨</span>

<h3>Man</h3>

</div>

<div
class="gender-card"
id="femaleCard">

<span>👩</span>

<h3>Woman</h3>

</div>

</div>

</div>
<div class="card">

<label class="label">

Interested In

</label>

<div class="gender-grid" id="lookingForOptions">

<div
class="gender-card"
data-value="Men">

<span>👨</span>

<h3>Men</h3>

</div>

<div
class="gender-card"
data-value="Women">

<span>👩</span>

<h3>Women</h3>

</div>

<div
class="gender-card"
data-value="Everyone"
style="grid-column:1/3;">

<span>❤️</span>

<h3>Everyone</h3>

</div>

</div>

</div>

<div class="card">

<label class="label">

Location

</label>

<p style="color:#A0A0A0;margin-bottom:18px;line-height:1.7;">

Allow location access so we can show nearby people that match your preferences.

</p>

<button
type="button"
id="locationBtn"
class="continue-btn"
style="margin-top:0;">

📍 Allow Location

</button>

</div>

<button
id="saveBtn"
class="continue-btn">

Continue

</button>

<div
id="loading"
class="loading">

Saving your profile...

</div>

</main>

<script src="details.js" type="module"></script>

</body>

</html>
